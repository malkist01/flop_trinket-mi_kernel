# A friendly name for the workflow, shown in the GitHub Actions tab.
name: Build Ginkgo Kernel (KernelSU)

# Controls when the action will run.
on:
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:
  # Triggers the workflow on push events to the main branch.
  push:
    branches:
      - main

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    env:
      DEBIAN_FRONTEND: noninteractive
      USE_CCACHE: 1
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CC: ccache clang
      CXX: ccache clang++
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install apt-utils -y
          sudo apt-get install ccache clang llvm lld -y
          sudo hostnamectl set-hostname wyref

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore AOSP Clang from cache
        uses: actions/cache@v5
        with:
          path: ../toolchains/aospclang
          key: aospclang-${{ runner.os }}-r547379

      - name: Download and extract AOSP Clang if missing
        run: |
          if [ ! -x "../toolchains/aospclang/bin/clang" ]; then
            echo "INFO: AOSP Clang not found in cache. Downloading..."
            pwd 
            mkdir -p ../toolchains/aospclang
            curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz \
              -o ../clang.tar.gz
            tar -xzf ../clang.tar.gz -C ../toolchains/aospclang/
            rm ../clang.tar.gz
            ls -alh ../toolchains/aospclang/bin/clang
          else
            echo "INFO: AOSP Clang restored from cache."
            pwd 
            ls -alh ../toolchains/aospclang/bin/clang
          fi
          
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-kernel-build
          restore-keys: |
            ${{ runner.os }}-kernel-build-

      - name: Build the Kernel
        run: |
          # echo "USE_CCACHE=1" >> $GITHUB_ENV
          # echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          # echo "CC='ccache clang'" >> $GITHUB_ENV
          # echo "CXX='ccache clang++'" >> $GITHUB_ENV
          bash do_build.sh ginkgo c u R

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: KernelSU-Ginkgo-${{ github.sha }}
          path: /home/runner/work/flop_trinket-mi_kernel/*ginkgo*.zip

      - name: Release Ginkgo Kernel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ginkgo-${{ github.sha }}
          name: KernelSU Ginkgo Build - ${{ github.sha }}
          body: |
            ✅ Ginkgo Kernel built with KernelSU
          files: /home/runner/work/flop_trinket-mi_kernel/*ginkgo*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
